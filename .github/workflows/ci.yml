name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true # node_modules type issues shouldn't block CI

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          ANTHROPIC_API_KEY: "sk-test-dummy"
          NEXTAUTH_SECRET: "test-secret"

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # ВАЖНО: эти значения пробрасываем через env, а не через ${{ }} в `run`.
          # ${{ github.event.head_commit.message }} интерполируется в текст скрипта
          # ДО запуска bash, и любые `(`, `` ` ``, `$` в commit message ломали парсинг.
          # Через env GitHub Actions безопасно экранирует значение для shell.
          STATUS: ${{ job.status }}
          COMMIT_MSG_RAW: ${{ github.event.head_commit.message }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not configured, skipping notification"
            exit 0
          fi

          # Только первая строка коммита, без кавычек/бэкслешей.
          COMMIT_MSG=$(printf '%s' "$COMMIT_MSG_RAW" | head -1 | tr -d '"\\')
          SHORT_SHA="${SHA:0:7}"

          if [ "$STATUS" = "success" ]; then
            ICON="✅"
            TEXT=$(printf '%s Staffix CI passed\n\nBranch: %s\nCommit: %s\nBy: %s\nMessage: %s' \
              "$ICON" "$BRANCH" "$SHORT_SHA" "$ACTOR" "$COMMIT_MSG")
          else
            ICON="❌"
            TEXT=$(printf '%s Staffix CI FAILED\n\nBranch: %s\nCommit: %s\nBy: %s\nMessage: %s\n\nCheck: https://github.com/%s/actions/runs/%s' \
              "$ICON" "$BRANCH" "$SHORT_SHA" "$ACTOR" "$COMMIT_MSG" "$REPO" "$RUN_ID")
          fi

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${TEXT}" \
            -d disable_web_page_preview=true || true

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true # node_modules type issues shouldn't block CI

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          ANTHROPIC_API_KEY: "sk-test-dummy"
          NEXTAUTH_SECRET: "test-secret"

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not configured, skipping notification"
            exit 0
          fi

          STATUS="${{ job.status }}"
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1 | sed 's/[\"\\]//g')
          ACTOR="${{ github.actor }}"
          REPO="${{ github.repository }}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          BRANCH="${{ github.ref_name }}"

          if [ "$STATUS" = "success" ]; then
            ICON="✅"
            TEXT="$ICON Staffix CI passed\n\nBranch: $BRANCH\nCommit: $SHORT_SHA\nBy: $ACTOR\nMessage: $COMMIT_MSG"
          else
            ICON="❌"
            TEXT="$ICON Staffix CI FAILED\n\nBranch: $BRANCH\nCommit: $SHORT_SHA\nBy: $ACTOR\nMessage: $COMMIT_MSG\n\nCheck: https://github.com/$REPO/actions/runs/${{ github.run_id }}"
          fi

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="$(echo -e "$TEXT")" \
            -d disable_web_page_preview=true || true

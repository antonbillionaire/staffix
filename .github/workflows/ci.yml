name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true # node_modules type issues shouldn't block CI

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          ANTHROPIC_API_KEY: "sk-test-dummy"
          NEXTAUTH_SECRET: "test-secret"

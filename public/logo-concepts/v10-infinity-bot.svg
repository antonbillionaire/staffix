<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg10" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg10)"/>

  <!-- Bot/avatar head — simple, iconic, modern -->
  <!-- Outer head shape -->
  <rect x="166" y="108" width="180" height="180" rx="40" fill="white"/>

  <!-- Eyes — glowing dots = AI is ON, thinking -->
  <circle cx="222" cy="205" r="20" fill="#3B82F6"/>
  <circle cx="290" cy="205" r="20" fill="#6366F1"/>
  <!-- Eye highlights -->
  <circle cx="215" cy="198" r="6" fill="white" opacity="0.7"/>
  <circle cx="283" cy="198" r="6" fill="white" opacity="0.7"/>

  <!-- Infinity symbol as mouth = endless automation, never stops working -->
  <path d="M224 248 C224 238, 234 232, 244 238 C250 242, 256 248, 256 248 C256 248, 262 242, 268 238 C278 232, 288 238, 288 248 C288 258, 278 264, 268 258 C262 254, 256 248, 256 248 C256 248, 250 254, 244 258 C234 264, 224 258, 224 248 Z"
        stroke="#4F46E5" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Signal waves from head = working, processing, sending -->
  <!-- Left -->
  <path d="M148 168 C138 185, 138 225, 148 242" stroke="white" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.4"/>
  <path d="M128 155 C112 182, 112 228, 128 255" stroke="white" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.25"/>
  <!-- Right -->
  <path d="M364 168 C374 185, 374 225, 364 242" stroke="white" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.4"/>
  <path d="M384 155 C400 182, 400 228, 384 255" stroke="white" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.25"/>

  <!-- Body/pedestal — simple, like a badge or ID card = employee -->
  <rect x="186" y="310" width="140" height="100" rx="16" fill="white" opacity="0.9"/>

  <!-- Neck connector -->
  <rect x="236" y="288" width="40" height="30" rx="4" fill="white" opacity="0.9"/>

  <!-- ID lines on body = employee badge -->
  <rect x="210" y="335" width="92" height="6" rx="3" fill="#4F46E5" opacity="0.4"/>
  <rect x="210" y="350" width="70" height="6" rx="3" fill="#6366F1" opacity="0.3"/>
  <rect x="210" y="365" width="50" height="6" rx="3" fill="#818CF8" opacity="0.2"/>

  <!-- Subtle gear icon on badge = automation -->
  <circle cx="306" cy="380" r="14" fill="none" stroke="#4F46E5" stroke-width="3" opacity="0.3"/>
  <circle cx="306" cy="380" r="6" fill="#4F46E5" opacity="0.3"/>
</svg>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="glow1" x1="180" y1="100" x2="332" y2="412" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#C4B5FD"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg1)"/>

  <!-- S-shape built from neural network nodes and connections -->
  <!-- Main S-curve path -->
  <path d="M310 130 C310 130, 340 130, 340 165 C340 200, 280 210, 256 220 C220 235, 172 245, 172 290 C172 340, 220 370, 256 370 C290 370, 340 360, 340 360"
        stroke="url(#glow1)" stroke-width="28" stroke-linecap="round" fill="none" opacity="0.3"/>
  <path d="M310 130 C310 130, 340 130, 340 165 C340 200, 280 210, 256 220 C220 235, 172 245, 172 290 C172 340, 220 370, 256 370 C290 370, 340 360, 340 360"
        stroke="white" stroke-width="14" stroke-linecap="round" fill="none"/>

  <!-- Neural nodes on the S-curve -->
  <circle cx="310" cy="130" r="16" fill="white"/>
  <circle cx="340" cy="165" r="12" fill="white" opacity="0.9"/>
  <circle cx="300" cy="200" r="10" fill="white" opacity="0.8"/>
  <circle cx="256" cy="220" r="14" fill="white"/>
  <circle cx="210" cy="248" r="10" fill="white" opacity="0.8"/>
  <circle cx="172" cy="290" r="12" fill="white" opacity="0.9"/>
  <circle cx="200" cy="340" r="10" fill="white" opacity="0.8"/>
  <circle cx="256" cy="370" r="14" fill="white"/>
  <circle cx="340" cy="360" r="16" fill="white"/>

  <!-- Branching neural connections from S-curve -->
  <!-- Top branches -->
  <line x1="310" y1="130" x2="240" y2="105" stroke="white" stroke-width="3" opacity="0.5"/>
  <circle cx="240" cy="105" r="6" fill="white" opacity="0.5"/>
  <line x1="310" y1="130" x2="280" y2="90" stroke="white" stroke-width="3" opacity="0.4"/>
  <circle cx="280" cy="90" r="5" fill="white" opacity="0.4"/>
  <line x1="340" y1="165" x2="380" y2="140" stroke="white" stroke-width="3" opacity="0.4"/>
  <circle cx="380" cy="140" r="5" fill="white" opacity="0.4"/>

  <!-- Middle branches -->
  <line x1="256" y1="220" x2="320" y2="250" stroke="white" stroke-width="3" opacity="0.5"/>
  <circle cx="320" cy="250" r="6" fill="white" opacity="0.5"/>
  <line x1="256" y1="220" x2="200" y2="190" stroke="white" stroke-width="3" opacity="0.4"/>
  <circle cx="200" cy="190" r="5" fill="white" opacity="0.4"/>
  <line x1="172" y1="290" x2="130" y2="270" stroke="white" stroke-width="3" opacity="0.4"/>
  <circle cx="130" cy="270" r="5" fill="white" opacity="0.4"/>
  <line x1="172" y1="290" x2="140" y2="320" stroke="white" stroke-width="3" opacity="0.4"/>
  <circle cx="140" cy="320" r="5" fill="white" opacity="0.4"/>

  <!-- Bottom branches -->
  <line x1="256" y1="370" x2="220" y2="400" stroke="white" stroke-width="3" opacity="0.5"/>
  <circle cx="220" cy="400" r="6" fill="white" opacity="0.5"/>
  <line x1="340" y1="360" x2="370" y2="395" stroke="white" stroke-width="3" opacity="0.4"/>
  <circle cx="370" cy="395" r="5" fill="white" opacity="0.4"/>
  <line x1="340" y1="360" x2="380" y2="340" stroke="white" stroke-width="3" opacity="0.4"/>
  <circle cx="380" cy="340" r="5" fill="white" opacity="0.4"/>

  <!-- Inner glow on main nodes -->
  <circle cx="310" cy="130" r="8" fill="#4F46E5" opacity="0.6"/>
  <circle cx="256" cy="220" r="7" fill="#4F46E5" opacity="0.6"/>
  <circle cx="256" cy="370" r="7" fill="#4F46E5" opacity="0.6"/>
  <circle cx="340" cy="360" r="8" fill="#4F46E5" opacity="0.6"/>
</svg>
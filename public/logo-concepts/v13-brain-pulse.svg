<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg13" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A0A1A"/>
      <stop offset="100%" stop-color="#151530"/>
    </linearGradient>
    <linearGradient id="brainFill13" x1="150" y1="80" x2="370" y2="370" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4F46E5" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="accent13" x1="120" y1="240" x2="400" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="30%" stop-color="#8B5CF6"/>
      <stop offset="60%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  <!-- Dark background -->
  <rect width="512" height="512" rx="96" fill="url(#bg13)"/>

  <!-- Brain shape — filled with subtle gradient -->
  <!-- Left hemisphere -->
  <path d="M250 88 C215 90, 168 106, 145 148 C122 190, 118 220, 125 252 C112 262, 104 286, 108 316 C112 346, 130 362, 150 370 C150 392, 170 408, 198 412 C218 416, 238 414, 250 406"
        stroke="#6366F1" stroke-width="3" fill="url(#brainFill13)" stroke-linejoin="round" opacity="0.8"/>
  <!-- Right hemisphere -->
  <path d="M262 88 C297 90, 344 106, 367 148 C390 190, 394 220, 387 252 C400 262, 408 286, 404 316 C400 346, 382 362, 362 370 C362 392, 342 408, 314 412 C294 416, 274 414, 262 406"
        stroke="#6366F1" stroke-width="3" fill="url(#brainFill13)" stroke-linejoin="round" opacity="0.8"/>

  <!-- Brain folds — elegant curves -->
  <path d="M160 175 C185 190, 220 178, 248 184" stroke="#6366F1" stroke-width="1.5" opacity="0.3" fill="none"/>
  <path d="M264 184 C292 178, 327 190, 352 175" stroke="#6366F1" stroke-width="1.5" opacity="0.3" fill="none"/>
  <path d="M135 252 C165 238, 210 248, 248 242" stroke="#6366F1" stroke-width="1.5" opacity="0.25" fill="none"/>
  <path d="M264 242 C302 248, 347 238, 377 252" stroke="#6366F1" stroke-width="1.5" opacity="0.25" fill="none"/>
  <path d="M155 330 C185 315, 215 325, 248 318" stroke="#6366F1" stroke-width="1.5" opacity="0.2" fill="none"/>
  <path d="M264 318 C297 325, 327 315, 357 330" stroke="#6366F1" stroke-width="1.5" opacity="0.2" fill="none"/>

  <!-- CENTRAL PULSE — EKG/heartbeat line cutting through brain horizontally -->
  <!-- This is the "activity" — the brain is ALIVE and PROCESSING -->
  <path d="M110 248 L165 248 L180 248 L195 218 L210 278 L225 208 L240 268 L255 228 L270 260 L285 220 L300 265 L315 235 L330 258 L345 248 L400 248"
        stroke="url(#accent13)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>
  <!-- Pulse glow -->
  <path d="M110 248 L165 248 L180 248 L195 218 L210 278 L225 208 L240 268 L255 228 L270 260 L285 220 L300 265 L315 235 L330 258 L345 248 L400 248"
        stroke="url(#accent13)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.15"/>

  <!-- Data flow particles along the pulse -->
  <circle cx="195" cy="218" r="4" fill="#8B5CF6" opacity="0.9"/>
  <circle cx="225" cy="208" r="3.5" fill="#EC4899" opacity="0.8"/>
  <circle cx="255" cy="228" r="4" fill="#3B82F6" opacity="0.9"/>
  <circle cx="285" cy="220" r="3.5" fill="#8B5CF6" opacity="0.8"/>
  <circle cx="315" cy="235" r="3" fill="#EC4899" opacity="0.7"/>

  <!-- Subtle vertical data streams inside brain -->
  <line x1="200" y1="130" x2="200" y2="380" stroke="#818CF8" stroke-width="1" opacity="0.08" stroke-dasharray="4 8"/>
  <line x1="256" y1="100" x2="256" y2="400" stroke="#818CF8" stroke-width="1" opacity="0.1" stroke-dasharray="4 8"/>
  <line x1="312" y1="130" x2="312" y2="380" stroke="#818CF8" stroke-width="1" opacity="0.08" stroke-dasharray="4 8"/>

  <!-- STAFFIX — premium, tracked out -->
  <text x="256" y="462" text-anchor="middle" font-family="'SF Pro Display', 'Inter', system-ui, sans-serif" font-size="36" font-weight="500" letter-spacing="10" fill="white" opacity="0.9">STAFFIX</text>
  <!-- Brand accent line under text -->
  <line x1="175" y1="474" x2="337" y2="474" stroke="url(#accent13)" stroke-width="1.5" opacity="0.5"/>
</svg>
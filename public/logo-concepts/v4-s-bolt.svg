<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#312E81"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="bolt4" x1="200" y1="100" x2="340" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg4)"/>

  <!-- Main S shape - bold and geometric -->
  <path d="M330 128 L220 128 C185 128, 155 155, 155 188 C155 221, 185 248, 220 248 L300 248 C335 248, 365 275, 365 308 C365 341, 335 368, 300 368 L185 368"
        stroke="white" stroke-width="38" stroke-linecap="round" fill="none"/>

  <!-- Lightning bolt cutting through the S -->
  <path d="M290 98 L240 230 L295 230 L230 410"
        stroke="url(#bolt4)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Bolt glow effect -->
  <path d="M290 98 L240 230 L295 230 L230 410"
        stroke="#FBBF24" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.5"
        filter="url(#blurBolt)"/>

  <!-- Energy particles -->
  <circle cx="265" cy="180" r="4" fill="#FBBF24" opacity="0.8"/>
  <circle cx="310" cy="280" r="3" fill="#FBBF24" opacity="0.6"/>
  <circle cx="220" cy="340" r="4" fill="#FBBF24" opacity="0.7"/>
  <circle cx="350" cy="160" r="3" fill="white" opacity="0.4"/>
  <circle cx="160" cy="300" r="3" fill="white" opacity="0.3"/>
</svg>
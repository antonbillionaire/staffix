<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg16" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A0A1A"/>
      <stop offset="100%" stop-color="#151530"/>
    </linearGradient>
    <linearGradient id="pulse16" x1="100" y1="210" x2="420" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="35%" stop-color="#8B5CF6"/>
      <stop offset="65%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <radialGradient id="glow16" cx="256" cy="200" r="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg16)"/>
  <circle cx="256" cy="200" r="160" fill="url(#glow16)"/>

  <!-- Original brain shape — scaled up, centered -->
  <g transform="translate(76, 30) scale(15)" fill="none" stroke="#818CF8" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" opacity="0.55">
    <path d="M12 18V5"/>
    <path d="M15 13a4.17 4.17 0 0 1-3-4 4.17 4.17 0 0 1-3 4"/>
    <path d="M17.598 6.5A3 3 0 1 0 12 5a3 3 0 1 0-5.598 1.5"/>
    <path d="M17.997 5.125a4 4 0 0 1 2.526 5.77"/>
    <path d="M18 18a4 4 0 0 0 2-7.464"/>
    <path d="M19.967 17.483A4 4 0 1 1 12 18a4 4 0 1 1-7.967-.517"/>
    <path d="M6 18a4 4 0 0 1-2-7.464"/>
    <path d="M6.003 5.125a4 4 0 0 0-2.526 5.77"/>
  </g>

  <!-- EKG pulse cutting horizontally through brain -->
  <path d="M115 210 L175 210 L195 210 L210 175 L225 245 L240 165 L255 235 L270 195 L285 230 L300 180 L315 225 L330 200 L345 215 L360 210 L410 210"
        stroke="url(#pulse16)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>
  <!-- Pulse glow -->
  <path d="M115 210 L175 210 L195 210 L210 175 L225 245 L240 165 L255 235 L270 195 L285 230 L300 180 L315 225 L330 200 L345 215 L360 210 L410 210"
        stroke="url(#pulse16)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.12"/>

  <!-- Peak highlight dots -->
  <circle cx="240" cy="165" r="4" fill="#EC4899" opacity="0.9"/>
  <circle cx="270" cy="195" r="3.5" fill="#8B5CF6" opacity="0.85"/>
  <circle cx="300" cy="180" r="3.5" fill="#3B82F6" opacity="0.85"/>
  <circle cx="210" cy="175" r="3" fill="#8B5CF6" opacity="0.8"/>
  <circle cx="225" cy="245" r="3" fill="#EC4899" opacity="0.7"/>

  <!-- Subtle vertical data streams inside brain -->
  <line x1="200" y1="100" x2="200" y2="300" stroke="#818CF8" stroke-width="1" opacity="0.07" stroke-dasharray="3 7"/>
  <line x1="256" y1="80" x2="256" y2="310" stroke="#818CF8" stroke-width="1" opacity="0.09" stroke-dasharray="3 7"/>
  <line x1="312" y1="100" x2="312" y2="300" stroke="#818CF8" stroke-width="1" opacity="0.07" stroke-dasharray="3 7"/>

  <!-- Tiny sparks scattered -->
  <circle cx="180" cy="150" r="2" fill="white" opacity="0.4"/>
  <circle cx="330" cy="155" r="1.5" fill="white" opacity="0.35"/>
  <circle cx="195" cy="260" r="2" fill="white" opacity="0.3"/>
  <circle cx="320" cy="250" r="1.5" fill="white" opacity="0.3"/>

  <!-- STAFFIX -->
  <text x="256" y="400" text-anchor="middle" font-family="'SF Pro Display', 'Inter', system-ui, sans-serif" font-size="36" font-weight="500" letter-spacing="10" fill="white" opacity="0.9">STAFFIX</text>
  <!-- Accent line under text -->
  <line x1="170" y1="412" x2="342" y2="412" stroke="url(#pulse16)" stroke-width="1.5" opacity="0.45"/>
</svg>